name: Hyperliquid Bot Original (cada 30 min)

on:
  schedule:
    - cron: '*/30 * * * *'          # cada 30 minutos
  workflow_dispatch:                # permite ejecución manual

concurrency:
  group: bot-cron-original
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache de pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # Usamos claves fijas para que los caches se sobrescriban siempre con el estado más reciente
      - name: Restaurar caché de velas
        uses: actions/cache@v4
        with:
          path: candles_cache.json
          key: candles-original

      - name: Restaurar position_state.json
        uses: actions/cache@v4
        with:
          path: position_state.json
          key: pos-state-original

      - name: Restaurar bot_light_state.json
        uses: actions/cache@v4
        with:
          path: bot_light_state.json
          key: light-state-original

      - name: Ejecutar bot (una pasada)
        id: bot
        run: python bot_cron.py
        env:
          HL_PRIVATE_KEY: ${{ secrets.HL_PRIVATE_KEY }}
          HL_WALLET_ADDRESS: ${{ secrets.HL_WALLET_ADDRESS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Guardar caches (se sobrescribirán en la siguiente ejecución)
      - name: Guardar caché de velas
        if: always()
        uses: actions/cache@v4
        with:
          path: candles_cache.json
          key: candles-original

      - name: Guardar position_state.json
        if: always()
        uses: actions/cache@v4
        with:
          path: position_state.json
          key: pos-state-original

      - name: Guardar bot_light_state.json
        if: always()
        uses: actions/cache@v4
        with:
          path: bot_light_state.json
          key: light-state-original

      - name: Notificar error si falló
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ El bot falló en la última ejecución."
