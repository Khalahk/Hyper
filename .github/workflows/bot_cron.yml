name: Hyperliquid Bot (cada 30 min)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: bot-cron
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache de pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Restaurar caché de velas
        uses: actions/cache@v4
        with:
          path: candles_cache.json
          key: candles-${{ github.run_id }}
          restore-keys: |
            candles-

      - name: Restaurar estado del bot
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Restaurar estadísticas
        uses: actions/cache@v4
        with:
          path: stats.json
          key: stats-${{ github.run_id }}
          restore-keys: |
            stats-

      - name: Restaurar órdenes enviadas
        uses: actions/cache@v4
        with:
          path: sent_orders.json
          key: sent-orders-${{ github.run_id }}
          restore-keys: |
            sent-orders-

      - name: Restaurar registro de órdenes
        uses: actions/cache@v4
        with:
          path: orders.csv
          key: orders-${{ github.run_id }}
          restore-keys: |
            orders-

      - name: Restaurar trades
        uses: actions/cache@v4
        with:
          path: trades.csv
          key: trades-${{ github.run_id }}
          restore-keys: |
            trades-

      - name: Ejecutar bot
        id: bot
        run: python bot_cron.py
        env:
          HL_PRIVATE_KEY: ${{ secrets.HL_PRIVATE_KEY }}
          HL_WALLET_ADDRESS: ${{ secrets.HL_WALLET_ADDRESS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Guardar caché de velas
        if: always()
        uses: actions/cache@v4
        with:
          path: candles_cache.json
          key: candles-${{ github.run_id }}

      - name: Guardar estado del bot
        if: always()
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: bot-state-${{ github.run_id }}

      - name: Guardar estadísticas
        if: always()
        uses: actions/cache@v4
        with:
          path: stats.json
          key: stats-${{ github.run_id }}

      - name: Guardar órdenes enviadas
        if: always()
        uses: actions/cache@v4
        with:
          path: sent_orders.json
          key: sent-orders-${{ github.run_id }}

      - name: Guardar registro de órdenes
        if: always()
        uses: actions/cache@v4
        with:
          path: orders.csv
          key: orders-${{ github.run_id }}

      - name: Guardar trades
        if: always()
        uses: actions/cache@v4
        with:
          path: trades.csv
          key: trades-${{ github.run_id }}

      - name: Notificar error si falló
        if: steps.bot.outcome == 'failure'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ El bot falló en la última ejecución."
